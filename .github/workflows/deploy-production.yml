name: Deploy CSFAQ to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CSFAQ_DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.CSFAQ_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 csfaq-deploy@${{ secrets.CSFAQ_HOST }} bash << 'DEPLOY'
            set -e

            cd /home/csfaq-prod/crowd-source-faq

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing root dependencies (tsx + shared packages)..."
            npm install --prefer-offline

            echo "==> Installing and building frontend..."
            cd apps/frontend
            pnpm install --frozen-lockfile
            pnpm build
            cd ../..

            echo "==> Restarting csfaq service..."
            sudo systemctl restart csfaq.service

            echo "==> Reloading nginx..."
            sudo systemctl reload nginx

            echo "==> Deployment complete."
          DEPLOY
